<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Package 3 - Mountain Retreat</title>

<link rel="stylesheet" href="package_option.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
</head>

<body data-package="HIL-PKG-003">

<nav id="navbar">

  <div class="logo">
    <div class="logo-circle">
      <img src="logop.jpeg" alt="Penang Wonders">
    </div>

    <span class="logo-name">
      Penang Wonders
    </span>
  </div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="package_alt.html" class="active">Package</a>
    <a href="#">Blog</a>
    <a href="#">Coupon</a>
  </div>

</nav>

<div class="content">

  <div class="hero">

    <div class="hero-img">

      <img
        id="slide3"
        src="package3.jpg"
        alt="Hillside Adventure"
        onclick="openLightbox(this)"
      >

      <button class="prev" onclick="prevSlide('slide3')">❮</button>
      <button class="next" onclick="nextSlide('slide3')">❯</button>

    </div>

    <div class="details">

      <h1 id="title"></h1>

      <p class="price" id="price"></p>

      <button class="showdesc" onclick="toggleText()">

      </button>

      <div id="text">

        <div id="desc"></div>

        <div id="includes"></div>

        <div id="guide"></div>

      </div>

      <br>

      <a href="https://google.com/maps/hillside"
        target="_blank"
        class="map-link">
        📍 View on Google Maps
      </a>

      <a href="booking.html?package=HIL-PKG-003"
        class="btn">
        Book Now
      </a>

  </div>

  </div>

  <div class="extra-section">
    <h2>Experience the Hills</h2>
  </div>

</div>

  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>

  <footer>
