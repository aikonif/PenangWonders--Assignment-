<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Package Detail - Penang Wonders</title>
<link rel="stylesheet" href="CSS/Main.css">
<link rel="stylesheet" href="CSS/package_detail.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Nunito:wght@700;800;900&display=swap"/>
  <link rel="stylesheet" href="CSS/Accessibility.css">
</head>
  <body data-package="" id="packagePage">

  <nav id="navbarHTML"></nav>

  <button id="backBtn" class="back-button" aria-label="Go back to previous page">← Back</button>

  <div class="content">
    <div class="hero">
      <div class="hero-img">
        <img id="mainImage" src="" alt="Package" onclick="openLightbox(this)">
        <button class="prev" onclick="prevSlide()">❮</button>
        <button class="next" onclick="nextSlide()">❯</button>
      </div>
      <div class="details">
        <h1 id="title"></h1>
        <p class="price" id="price"></p>
        <button class="showdesc" onclick="toggleText()">Hide Description</button>
        <div id="text">
          <div id="desc"></div>
          <div id="includes"></div>
          <div id="guide"></div>
        </div>
        <br>
        <a href="#" target="_blank" id="mapLink" class="map-link">📍 View on Google Maps</a>
        <br>
        <a href="booking.html" id="bookLink" class="btn">Book Now</a>
      </div>
    </div>
    <div class="extra-section">
      <h2 id="extraTitle"></h2>
    </div>
  </div>

  <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img">
  </div>
  
  <button id = "backToTopBtn">↑</button>
  <div id="footerHTML"></div>

  <script src="JS/package_detail.js"></script>
  <script src="JS/Navbar.js"></script>
  <script src="JS/Footer.js"></script>
  <script src="JS/Back_To_Top.js"></script>
  <script src="JS/BackButton.js"></script>

  <script src="JS/Accessibility.js"></script>
</body>
</html>
